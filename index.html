<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CLOSET HOTEL | Residents Only</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Inter:wght@200;300;400;600&display=swap');

        :root {
            --black: #121212;
            --white: #ffffff;
            --soft-blush: #fff9f9;
            --tier-gold: #C5A059;
            --tier-silver: #A8A8A8;
            --font-vogue: 'Bodoni Moda', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--font-sans);
            margin: 0;
            padding-bottom: 90px;
        }

        /* --- Elegant Header --- */
        header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid #f2f2f2;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1000;
        }

        .hotel-brand {
            font-family: var(--font-vogue);
            font-size: 28px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }

        .section-title {
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #999;
            margin-top: 10px;
            font-weight: 300;
        }

        /* --- The Promenade Feed --- */
        .page { display: none; animation: fadeIn 0.6s ease; }
        .page.active { display: block; }

        .promenade-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            column-count: 2;
            column-gap: 20px;
        }

        @media (min-width: 768px) { .promenade-container { column-count: 3; } }

        .wardrobe-piece {
            break-inside: avoid;
            margin-bottom: 30px;
            position: relative;
            transition: transform 0.3s ease;
        }

        .wardrobe-piece img {
            width: 100%;
            border-radius: 2px;
            display: block;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
        }

        /* --- Room Key (Tier Badges) --- */
        .room-key {
            position: absolute;
            top: 15px;
            left: 15px;
            font-size: 9px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(5px);
            border: 1px solid #eee;
            letter-spacing: 1px;
            font-weight: 600;
            text-transform: uppercase;
        }
        .key-t1 { border-left: 3px solid var(--tier-gold); }
        .key-t2 { border-left: 3px solid var(--tier-silver); }

        .piece-info {
            padding: 12px 0;
            border-bottom: 1px solid #f9f9f9;
        }

        .piece-name {
            font-family: var(--font-vogue);
            font-size: 16px;
            margin-bottom: 4px;
        }

        .resident-handle {
            font-size: 10px;
            color: #888;
            letter-spacing: 1px;
        }

        /* --- Auth Overlay --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .auth-input {
            border: none;
            border-bottom: 1px solid #eee;
            padding: 15px;
            width: 300px;
            margin-bottom: 10px;
            font-family: var(--font-sans);
            outline: none;
            text-align: center;
        }

        /* --- Bottom Concierge Nav --- */
        .concierge-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            border-top: 1px solid #eee;
            z-index: 2000;
        }

        .nav-item { font-size: 18px; color: #ddd; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--black); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 class="hotel-brand">The Closet Hotel</h1>
        <p class="section-title">Check-in to your Suite</p>
        <div style="margin-top: 40px;">
            <input type="text" id="username" class="auth-input" placeholder="USERNAME"><br>
            <input type="email" id="useremail" class="auth-input" placeholder="EMAIL ADDRESS"><br>
            <input type="password" id="userpass" class="auth-input" placeholder="PASSWORD"><br>
            <button onclick="handleCheckIn()" style="background: black; color: white; border: none; padding: 15px 80px; margin-top: 20px; font-size: 10px; letter-spacing: 2px; cursor: pointer;">ENTER THE LOBBY</button>
        </div>
    </div>

    <header id="main-header" style="display:none;">
        <h1 class="hotel-brand">The Closet Hotel</h1>
        <div id="page-title" class="section-title">The Promenade</div>
    </header>

    <main id="promenade" class="page">
        <div class="promenade-container" id="feed-items">
            </div>
    </main>

    <main id="checkin-piece" class="page">
        <div style="text-align: center; padding: 60px 20px;">
            <p class="section-title">New Archive</p>
            <div style="width: 100%; max-width: 400px; height: 500px; background: #fafafa; border: 1px solid #eee; margin: 20px auto; display: flex; align-items: center; justify-content: center;">
                <p style="font-size: 10px; color: #ccc;">LIGHT BACKDROP ONLY</p>
            </div>
            <button style="border: 1px solid black; background: none; padding: 10px 40px; font-size: 10px;">UPLOAD PORTRAIT</button>
        </div>
    </main>

    <nav class="concierge-nav" id="main-nav" style="display:none;">
        <i class="fa-solid fa-hotel nav-item active" onclick="showSection('promenade', this)"></i>
        <i class="fa-solid fa-magnifying-glass nav-item"></i>
        <i class="fa-solid fa-plus nav-item" onclick="showSection('checkin-piece', this)"></i>
        <i class="fa-solid fa-paper-plane nav-item"></i>
        <i class="fa-solid fa-user-tie nav-item"></i>
    </nav>

    <script>
        const wardrobeDatabase = [
            { name: "Silk Slip Archive", tier: "T1", resident: "@claire_beau", img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=800" },
            { name: "Vintage Wool Blazer", tier: "T1", resident: "@archival_girl", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800" },
            { name: "Minimalist Linen Set", tier: "T2", resident: "@sophie_minimal", img: "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=800" },
            { name: "Structured Mini Dress", tier: "T1", resident: "@couture_resident", img: "https://images.unsplash.com/photo-1539109132314-347752418b30?w=800" }
        ];

        function handleCheckIn() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Please introduce yourself.");
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'block';
            document.getElementById('main-nav').style.display = 'flex';
            showSection('promenade');
            renderPromenade();
        }

        function renderPromenade() {
            const feed = document.getElementById('feed-items');
            feed.innerHTML = wardrobeDatabase.map(item => `
                <div class="wardrobe-piece">
                    <div class="room-key ${item.tier === 'T1' ? 'key-t1' : 'key-t2'}">${item.tier} Piece</div>
                    <img src="${item.img}">
                    <div class="piece-info">
                        <div class="piece-name">${item.name}</div>
                        <div class="resident-handle">Resident: ${item.resident}</div>
                    </div>
                </div>
            `).join('');
        }

        function showSection(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            const titles = { 'promenade': 'The Promenade', 'checkin-piece': 'Wardrobe Check-in' };
            document.getElementById('page-title').innerText = titles[id];

            if(el) {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                el.classList.add('active');
            }
        }
    </script>
</body>
</html>
