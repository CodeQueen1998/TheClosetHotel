<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HOTEL CLOSET | Elite Wardrobe Exchange</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --soft-gray: #f8f8f8;
            --font-vogue: 'Bodoni Moda', serif;
            --font-sans: 'Inter', sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--font-sans);
            margin: 0;
            padding-bottom: 80px;
            letter-spacing: -0.01em;
        }

        header {
            background: var(--white);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .hotel-logo {
            font-family: var(--font-vogue);
            font-size: 28px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 10px;
        }

        .concierge-status {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
        }

        .credit-count {
            color: var(--black);
            font-weight: bold;
            padding-left: 5px;
            border-bottom: 1px solid black;
        }

        /* --- Pinterest style Feed --- */
        .main-feed {
            max-width: 1400px;
            margin: 0 auto;
            column-count: 3;
            column-gap: 20px;
            padding: 30px;
        }

        .closet-card {
            break-inside: avoid;
            margin-bottom: 30px;
            position: relative;
            background: var(--soft-gray);
            overflow: hidden;
        }

        .closet-card img {
            width: 100%;
            display: block;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .closet-card:hover img {
            transform: scale(1.03);
        }

        .tier-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 6px 12px;
            font-size: 9px;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            z-index: 10;
        }

        /* --- Hover Overlay --- */
        .card-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s ease;
            cursor: pointer;
        }

        .closet-card:hover .card-overlay {
            opacity: 1;
            background: rgba(255,255,255,0.8);
        }

        .btn-action {
            background: var(--black);
            color: var(--white);
            border: none;
            width: 75%;
            padding: 14px;
            margin: 6px 0;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .btn-bid {
            background: transparent;
            border: 1px solid var(--black);
            color: var(--black);
        }

        .owner-info {
            padding: 15px 0;
            font-family: var(--font-vogue);
            font-style: italic;
            font-size: 15px;
        }

        /* --- Bottom Concierge Bar --- */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 25px 0;
            border-top: 1px solid #f0f0f0;
            z-index: 2000;
        }

        .nav-icon {
            font-size: 18px;
            color: var(--black);
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-icon:hover {
            opacity: 1;
        }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--black);
            color: var(--white);
            padding: 12px 30px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: none;
            z-index: 3000;
        }

        @media (max-width: 800px) {
            .main-feed { column-count: 2; }
        }
    </style>
</head>
<body>

    <header>
        <div class="hotel-logo">The Hotel Closet</div>
        <div class="concierge-status">Guest Concierge | <span class="credit-count" id="user-credits">100</span> Credits Available</div>
    </header>

    <main class="main-feed">
        <div class="closet-card">
            <span class="tier-indicator">Tier 1 | Elite Designer</span>
            <img src="https://images.unsplash.com/photo-1539109132314-347752418b30?auto=format&fit=crop&w=600&q=80">
            <div class="card-overlay">
                <button class="btn-action" onclick="swap(1)">Borrow (20 Credits)</button>
                <button class="btn-action btn-bid" onclick="bid()">Place Bid</button>
            </div>
            <div class="owner-info">@archiviste_paris</div>
        </div>

        <div class="closet-card">
            <span class="tier-indicator">Tier 2 | Boutique Luxury</span>
            <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=600&q=80">
            <div class="card-overlay">
                <button class="btn-action" onclick="swap(2)">Borrow (10 Credits)</button>
                <button class="btn-action btn-bid" onclick="bid()">Place Bid</button>
            </div>
            <div class="owner-info">@camilla_collector</div>
        </div>

        <div class="closet-card">
            <span class="tier-indicator">Tier 3 | Fast Fashion</span>
            <img src="https://images.unsplash.com/photo-1554568218-0f1715e72254?auto=format&fit=crop&w=600&q=80">
            <div class="card-overlay">
                <button class="btn-action" onclick="swap(3)">Borrow (5 Credits)</button>
                <button class="btn-action btn-bid" onclick="bid()">Place Bid</button>
            </div>
            <div class="owner-info">@zara_edit</div>
        </div>
        
        <div class="closet-card">
            <span class="tier-indicator">Tier 1 | Elite Designer</span>
            <img src="https://images.unsplash.com/photo-1581044777550-4cfa60707c33?auto=format&fit=crop&w=600&q=80">
            <div class="card-overlay">
                <button class="btn-action" onclick="swap(1)">Borrow (20 Credits)</button>
            </div>
            <div class="owner-info">@vogue_vintage</div>
        </div>
    </main>

    <div id="toast">Request processed by concierge.</div>

    <nav class="bottom-nav">
        <i class="fa-solid fa-hotel nav-icon"></i>
        <i class="fa-solid fa-magnifying-glass nav-icon"></i>
        <i class="fa-solid fa-bell nav-icon"></i>
        <i class="fa-solid fa-user-tie nav-icon"></i>
    </nav>

    <script>
        let credits = 100;

        function swap(tier) {
            let cost = 0;
            if(tier === 1) cost = 20;
            if(tier === 2) cost = 10;
            if(tier === 3) cost = 5;

            if(credits >= cost) {
                credits -= cost;
                document.getElementById('user-credits').innerText = credits;
                showToast("Request sent to the suite owner.");
            } else {
                showToast("Front Desk: Insufficient credits.");
            }
        }

        function bid() {
            prompt("Submit your private offer to the owner ($):");
            showToast("Bid sent for review.");
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
