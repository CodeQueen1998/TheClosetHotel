<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CLOSET HOTEL | The Promenade</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;1,400&family=Inter:wght@200;300;400;600&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --soft-gray: #fafafa;
            --gold: #C5A059;
            --font-vogue: 'Bodoni Moda', serif;
            --font-sans: 'Inter', sans-serif;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--font-sans);
            margin: 0;
            display: flex;
        }

        /* --- Sidebar (The Concierge Desk) --- */
        nav.sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            border-right: 1px solid #eee;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            padding: 40px 25px;
            background: white;
            z-index: 1000;
        }

        .sidebar-brand {
            font-family: var(--font-vogue);
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            text-decoration: none;
            color: black;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: #888;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i { font-size: 18px; width: 25px; }
        .nav-item:hover, .nav-item.active { color: var(--black); }

        .user-suite-mini {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-circle {
            width: 35px;
            height: 35px;
            background: var(--soft-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            border: 1px solid #eee;
        }

        /* --- Main Content Area --- */
        main.content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 40px;
            min-height: 100vh;
        }

        .page-header {
            margin-bottom: 40px;
        }

        .page-header h2 {
            font-family: var(--font-vogue);
            font-size: 32px;
            font-weight: 400;
            margin: 0;
        }

        /* --- Pinterest Masonry Grid --- */
        .promenade-grid {
            column-count: 3;
            column-gap: 25px;
        }

        @media (max-width: 1200px) { .promenade-grid { column-count: 2; } }

        .wardrobe-card {
            break-inside: avoid;
            margin-bottom: 25px;
            position: relative;
            background: var(--white);
            transition: 0.3s ease;
        }

        .wardrobe-card img {
            width: 100%;
            border-radius: 4px;
            display: block;
        }

        .tier-key {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255,255,255,0.9);
            padding: 5px 12px;
            font-size: 9px;
            letter-spacing: 1px;
            font-weight: 600;
            border: 1px solid #eee;
        }

        .card-meta {
            padding: 15px 5px;
        }

        .piece-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .resident-tag { font-size: 11px; color: #999; }

        /* --- Auth Overlay --- */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 5000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 350px;
            text-align: center;
        }

        .auth-card input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-bottom: 1px solid #eee;
            font-family: var(--font-sans);
            outline: none;
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            nav.sidebar { width: 70px; padding: 40px 10px; align-items: center; }
            .sidebar-brand, .nav-item span, .user-suite-mini span { display: none; }
            main.content { margin-left: 70px; width: calc(100% - 70px); padding: 20px; }
            .promenade-grid { column-count: 2; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <h1 style="font-family: var(--font-vogue); letter-spacing: 3px;">The Closet Hotel</h1>
            <p style="font-size: 10px; letter-spacing: 2px; color: #999; margin-bottom: 40px;">RESIDENCY APPLICATION</p>
            <input type="text" id="username" placeholder="USERNAME">
            <input type="email" id="useremail" placeholder="EMAIL ADDRESS">
            <input type="password" id="userpass" placeholder="PASSWORD">
            <button onclick="login()" style="background: black; color: white; border: none; padding: 15px 40px; margin-top: 20px; font-size: 10px; cursor: pointer; width: 100%;">REQUEST ENTRY</button>
        </div>
    </div>

    <nav class="sidebar" id="main-sidebar" style="display: none;">
        <a href="#" class="sidebar-brand">TCH</a>
        
        <div class="nav-links">
            <a onclick="showPage('promenade')" class="nav-item active">
                <i class="fa-solid fa-hotel"></i>
                <span>The Promenade</span>
            </a>
            <a onclick="showPage('search')" class="nav-item">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>The Directory</span>
            </a>
            <a onclick="showPage('notifications')" class="nav-item">
                <i class="fa-solid fa-bell"></i>
                <span>Silver Platter</span>
            </a>
            <a onclick="showPage('messages')" class="nav-item">
                <i class="fa-solid fa-paper-plane"></i>
                <span>The Parlour</span>
            </a>
            <a onclick="showPage('upload')" class="nav-item">
                <i class="fa-solid fa-plus-square"></i>
                <span>Check-In Piece</span>
            </a>
        </div>

        <div class="user-suite-mini" onclick="showPage('suite')">
            <div class="avatar-circle" id="user-initial">R</div>
            <span id="display-name" style="font-size: 12px; font-weight: 600;">Resident</span>
        </div>
    </nav>

    <main class="content" id="main-content" style="display: none;">
        
        <section id="promenade" class="page-view">
            <div class="page-header">
                <h2>The Promenade</h2>
                <p style="font-size: 10px; color: #999; letter-spacing: 2px;">DISCOVER ARCHIVAL PIECES</p>
            </div>
            <div class="promenade-grid" id="global-feed">
                </div>
        </section>

        <section id="upload" class="page-view" style="display: none;">
            <div class="page-header">
                <h2>Check-in Piece</h2>
                <p style="font-size: 10px; color: #999; letter-spacing: 2px;">EXPAND YOUR SUITE</p>
            </div>
            <div style="max-width: 500px; background: var(--soft-gray); padding: 40px; border: 1px solid #eee; text-align: center;">
                <div style="border: 1px dashed #ccc; height: 300px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                    <p style="font-size: 11px; color: #999;">PORTRAIT: LIGHT BACKDROP</p>
                </div>
                <input type="text" placeholder="PIECE NAME (Brand, Year, Item)" style="width: 100%; padding: 10px; margin-bottom: 20px; border: none; border-bottom: 1px solid #ddd; background: transparent;">
                <button style="background: black; color: white; padding: 12px 30px; border: none; cursor: pointer; font-size: 10px;">CONFIRM TO ARCHIVE</button>
            </div>
        </section>

    </main>

    <script>
        const inventory = [
            { name: "Vintage Prada 1999", tier: "T1", resident: "@claire_beau", img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=800" },
            { name: "Silk Evening Gown", tier: "T1", resident: "@sophie_archive", img: "https://images.unsplash.com/photo-1539109132314-347752418b30?w=800" },
            { name: "Structured Blazer", tier: "T2", resident: "@minimalist_suite", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=800" },
            { name: "Archive Leather Boots", tier: "T1", resident: "@mod_vintage", img: "https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=800" },
            { name: "Cashmere Set", tier: "T2", resident: "@neutral_home", img: "https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=800" },
            { name: "Sheer Runway Piece", tier: "T1", resident: "@vogue_resident", img: "https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=800" }
        ];

        function login() {
            const user = document.getElementById('username').value;
            if(!user) return alert("Please sign the guestbook.");
            
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-sidebar').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('display-name').innerText = user;
            document.getElementById('user-initial').innerText = user[0].toUpperCase();
            
            renderFeed();
        }

        function renderFeed() {
            const feed = document.getElementById('global-feed');
            feed.innerHTML = inventory.map(item => `
                <div class="wardrobe-card">
                    <div class="tier-key">${item.tier} KEY</div>
                    <img src="${item.img}">
                    <div class="card-meta">
                        <div class="piece-title">${item.name}</div>
                        <div class="resident-tag">Resident: ${item.resident}</div>
                    </div>
                </div>
            `).join('');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            // This is a simple way to highlight the active nav
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
