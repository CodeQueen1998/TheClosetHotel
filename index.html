<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HOTEL CLOSET | Elite Wardrobe Exchange</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@200;300;400;600&display=swap');

        :root {
            --black: #000000;
            --white: #ffffff;
            --soft-gray: #f8f8f8;
            --border-color: #eeeeee;
            --font-vogue: 'Bodoni Moda', serif;
            --font-sans: 'Inter', sans-serif;
            --tier-1: #D4AF37;
        }

        body {
            background-color: var(--white);
            color: var(--black);
            font-family: var(--font-sans);
            margin: 0;
            padding-bottom: 100px;
            letter-spacing: -0.01em;
            overflow-x: hidden;
        }

        /* --- Auth Overlay --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: var(--white);
            z-index: 5000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .auth-input {
            border: none;
            border-bottom: 1px solid var(--black);
            padding: 15px;
            width: 100%;
            max-width: 300px;
            margin: 10px 0;
            font-family: var(--font-sans);
            outline: none;
            text-align: center;
        }

        /* --- Gift Card Logic --- */
        #gift-card-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.98);
            z-index: 6000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.8s ease;
        }

        .gift-card {
            width: 320px;
            height: 190px;
            background: var(--black);
            color: var(--white);
            border-radius: 12px;
            padding: 25px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .gift-card:hover { transform: scale(1.05) rotate(-2deg); }

        .card-logo { font-family: var(--font-vogue); font-size: 14px; letter-spacing: 3px; }
        .card-value { font-size: 24px; font-weight: 200; }
        .card-holder { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* --- Header --- */
        header {
            background: var(--white);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 2000;
        }

        .hotel-logo {
            font-family: var(--font-vogue);
            font-size: 24px;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
            cursor: pointer;
        }

        .concierge-status {
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            margin-top: 10px;
        }

        /* --- Grid & Cards --- */
        .page { display: none; max-width: 1400px; margin: 0 auto; animation: fadeIn 0.5s ease; }
        .page.active { display: block; }

        .main-feed { column-count: 3; column-gap: 20px; padding: 30px; }

        .closet-card {
            break-inside: avoid;
            margin-bottom: 30px;
            position: relative;
            background: var(--soft-gray);
        }

        .closet-card img { width: 100%; display: block; }

        .card-actions {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .heart-btn { cursor: pointer; transition: 0.3s; }
        .heart-btn.active { color: #ff4757; }

        /* --- Upload Section --- */
        #upload-preview {
            width: 100%;
            max-width: 300px;
            height: 300px;
            border: 1px dashed #ccc;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #upload-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Utilities --- */
        .btn-action {
            background: var(--black);
            color: var(--white);
            border: 1px solid var(--black);
            padding: 12px 25px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: var(--white);
            display: flex;
            justify-content: space-around;
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
            z-index: 3000;
        }

        .nav-icon { font-size: 18px; opacity: 0.4; cursor: pointer; transition: 0.3s; }
        .nav-icon.active { opacity: 1; }

        #toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--black);
            color: var(--white);
            padding: 12px 25px;
            font-size: 10px;
            display: none;
            z-index: 4000;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 800px) { .main-feed { column-count: 2; } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="hotel-logo" style="margin-bottom: 40px;">The Hotel Closet</div>
        <p style="font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">Check-in to your Suite</p>
        <input type="text" id="username" class="auth-input" placeholder="FULL NAME">
        <input type="email" id="useremail" class="auth-input" placeholder="EMAIL ADDRESS">
        <button class="btn-action" style="margin-top: 20px; width: 300px;" onclick="registerUser()">Enter the Lobby</button>
    </div>

    <div id="gift-card-overlay">
        <h2 style="font-family: var(--font-vogue); font-weight: 400;">A Welcome Gift</h2>
        <p style="font-size: 11px; margin-bottom: 40px;">TAP TO REDEEM YOUR CREDITS</p>
        <div class="gift-card" onclick="redeemCredits()">
            <div class="card-logo">THE HOTEL CLOSET</div>
            <div class="card-value">15.00 <span style="font-size: 12px;">CREDITS</span></div>
            <div class="card-holder" id="card-name-display">GUEST</div>
        </div>
    </div>

    <header>
        <div class="hotel-logo" onclick="showPage('lobby')">The Hotel Closet</div>
        <div class="concierge-status">Guest: <span id="display-name">...</span> | <span class="credit-count" id="user-credits">0</span> Credits</div>
    </header>

    <main id="lobby" class="page">
        <div class="main-feed" id="global-feed">
            </div>
    </main>

    <main id="vault" class="page">
        <div style="text-align: center; padding: 40px;">
            <h2 class="hotel-logo">Your Closet Vault</h2>
            <button class="btn-action" onclick="showPage('upload-page')">+ Archive New Piece</button>
        </div>
        <div class="main-feed" id="user-closet-feed"></div>
    </main>

    <main id="upload-page" class="page">
        <div style="text-align: center; padding: 40px;">
            <h2 class="hotel-logo">Add to Collection</h2>
            <div id="upload-preview">
                <p id="upload-text" style="font-size: 10px; color: #999;">SELECT IMAGE</p>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
            <button class="btn-action" onclick="document.getElementById('file-input').click()">Choose Photo</button>
            <br><br>
            <input type="text" id="item-name" class="auth-input" placeholder="ITEM NAME (e.g. Prada 1999 Skirt)">
            <br>
            <button class="btn-action" onclick="uploadItem()">Confirm Archive</button>
        </div>
    </main>

    <div id="toast">Concierge: Request Processed</div>

    <nav class="bottom-nav">
        <i class="fa-solid fa-hotel nav-icon" onclick="showPage('lobby', this)"></i>
        <i class="fa-solid fa-magnifying-glass nav-icon" onclick="searchFriends()"></i>
        <i class="fa-solid fa-plus-square nav-icon" onclick="showPage('upload-page', this)"></i>
        <i class="fa-solid fa-user-tie nav-icon" onclick="showPage('vault', this)"></i>
    </nav>

    <script>
        let userData = {
            name: "",
            credits: 0,
            myItems: [],
            liked: []
        };

        // 1. REGISTRATION logic
        function registerUser() {
            const name = document.getElementById('username').value;
            if(!name) return alert("Please enter your name");
            
            userData.name = name;
            document.getElementById('display-name').innerText = name;
            document.getElementById('card-name-display').innerText = name;
            
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('gift-card-overlay').style.display = 'flex';
        }

        // 2. GIFT CARD logic
        function redeemCredits() {
            userData.credits = 15;
            document.getElementById('user-credits').innerText = userData.credits;
            document.getElementById('gift-card-overlay').style.display = 'none';
            showPage('lobby');
            showToast("15 Credits Added to your Vault");
            renderFeed();
        }

        // 3. UPLOAD logic
        const fileInput = document.getElementById('file-input');
        fileInput.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                document.getElementById('upload-preview').innerHTML = `<img src="${reader.result}">`;
                userData.tempImg = reader.result;
            };
            reader.readAsDataURL(file);
        };

        function uploadItem() {
            const name = document.getElementById('item-name').value;
            if(!name || !userData.tempImg) return alert("Add a name and image");

            const newItem = { id: Date.now(), name: name, img: userData.tempImg, owner: "@"+userData.name.replace(" ", "_").toLowerCase() };
            userData.myItems.push(newItem);
            
            // Reset
            document.getElementById('item-name').value = "";
            document.getElementById('upload-preview').innerHTML = `<p style="font-size: 10px; color: #999;">SELECT IMAGE</p>`;
            
            showToast("Item Archived in Vault");
            renderFeed();
            showPage('vault');
        }

        // 4. FEED & INTERACTION logic
        function renderFeed() {
            const feed = document.getElementById('global-feed');
            const userFeed = document.getElementById('user-closet-feed');
            
            // Hardcoded initial items
            const initialItems = [
                { id: 1, name: "Elite Archive", img: "https://images.unsplash.com/photo-1539109132314-347752418b30?w=600", owner: "@archiviste_paris" },
                { id: 2, name: "Boutique Luxury", img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=600", owner: "@camilla_collector" }
            ];

            const allItems = [...initialItems, ...userData.myItems];
            
            feed.innerHTML = allItems.map(item => `
                <div class="closet-card">
                    <img src="${item.img}">
                    <div class="card-actions">
                        <span style="font-size: 10px;">${item.owner}</span>
                        <div>
                            <i class="fa-solid fa-heart heart-btn" onclick="toggleHeart(this)"></i>
                            <i class="fa-solid fa-paper-plane" style="margin-left:10px; font-size:12px;" onclick="showToast('Bidding opened...')"></i>
                        </div>
                    </div>
                </div>
            `).join('');

            userFeed.innerHTML = userData.myItems.map(item => `
                <div class="closet-card"><img src="${item.img}"></div>
            `).join('');
        }

        function toggleHeart(el) {
            el.classList.toggle('active');
            if(el.classList.contains('active')) showToast("Saved to Favorites");
        }

        function searchFriends() {
            const person = prompt("Search guest name or @suite:");
            if(person) showToast("Searching suites for " + person);
        }

        function showPage(pageId, navEl) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if(navEl) {
                document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
                navEl.classList.add('active');
            }
            window.scrollTo(0,0);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }
    </script>
</body>
</html>
